app = "projeto-gamenewsboard-back"
primary_region = "gru"

[build]

[env]
  ASPNETCORE_URLS = "http://+:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 1
  processes = ["app"]

[deploy]
  strategy = "immediate"
